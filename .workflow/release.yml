name: android-release
displayName: Android Release Build
triggers:
  push:
    branches:
      precise:
        - main

variables:
  # 这些变量的值在 Gitee Go 流水线的"变量"配置中设置（敏感信息会加密存储）
  KEYSTORE_BASE64: ${KEYSTORE_BASE64}
  KEYSTORE_PASSWORD: ${KEYSTORE_PASSWORD}
  KEY_ALIAS: ${KEY_ALIAS}
  KEY_PASSWORD: ${KEY_PASSWORD}

stages:
  - name: build
    displayName: 构建
    strategy: auto
    jobs:
      - name: build
        displayName: 构建 Release APK
        steps:
          - step: build@gradle
            name: build_release
            displayName: Gradle 构建
            jdkVersion: 17
            commands:
              # 1. 解码 keystore
              - echo "$KEYSTORE_BASE64" | base64 -d > $HOME/release.keystore
              - echo "Keystore decoded to $HOME/release.keystore"

              # 2. 设置签名环境变量
              - export KEYSTORE_PATH=$HOME/release.keystore
              - export KEYSTORE_PASSWORD=${KEYSTORE_PASSWORD}
              - export KEY_ALIAS=${KEY_ALIAS}
              - export KEY_PASSWORD=${KEY_PASSWORD}

              # 3. 验证 keystore 存在
              - ls -la $KEYSTORE_PATH

              # 4. 执行 release 构建
              - chmod +x gradlew
              - ./gradlew assembleRelease

              # 5. 验证签名
              - APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
              - echo "APK: $APK_PATH"
              - jarsigner -verify "$APK_PATH" && echo "签名验证通过" || echo "签名验证失败"
            artifacts:
              # 构建产物：APK 文件
              - app/build/outputs/apk/release/*.apk